apiVersion: apps/v1
kind: Deployment
metadata:
  name: plants-api-deployment
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: plants
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: plants
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: plants
    spec:
      containers:
        - name: plants-api-container
          image: khaym/plants-api
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_USER
              value: api_user
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb          # Nom de votre existingSecret
                  key: mongodb-password
            - name: MONGO_HOST
              value: mongodb
            - name: MONGO_PORT
              value: 27017
      imagePullSecrets:
        - name: docker-hub-secret
