apiVersion: apps/v1
kind: Deployment
metadata:
  name: plants-api-deployment
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: plants
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: plants
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: plants
    spec:
      containers:
        - name: plants-api-container
          image: khaym/plants-api
          ports:
            - containerPort: 3000
      imagePullSecrets:
        - name: docker-hub-secret
