apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plants
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/thibault-poire/plants.git
      targetRevision: prod
      path: k8s/api
      ref: repository
    - repoURL: https://charts.bitnami.com/bitnami
      chart: mongodb
      targetRevision: 19.1.10
      helm:
        releaseName: mongodb
        valueFiles:
          - $repository/k8s/database/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: plants
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
